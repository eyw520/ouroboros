name: gate

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Python (uv) setup — swap for actions/setup-node@v4 + `npm ci` on Node repos.
      # The runtime version comes from the repo's pin file, never hardcoded here:
      # `uv python install` reads .python-version; the poetry variant uses
      # setup-python's `python-version-file: .python-version`; node uses
      # setup-node's `node-version-file: .nvmrc`.
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install
      - run: uv sync --frozen

      # Warm the incremental tool caches across runs (mypy is the main
      # beneficiary; poetry repos should also cache deps via
      # setup-python's `cache: poetry`, node via setup-node's `cache: npm`).
      - uses: actions/cache@v4
        with:
          path: |
            .mypy_cache
            .ruff_cache
          key: toolcache-${{ runner.os }}-${{ hashFiles('**/uv.lock', '**/poetry.lock') }}

      # The gate is defined once, in the Makefile — CI just runs it.
      - run: make check
