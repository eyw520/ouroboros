name: gate

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Python (uv) setup — swap for actions/setup-node@v4 + `npm ci` on Node repos.
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install
      - run: uv sync --frozen

      # The gate is defined once, in the Makefile — CI just runs it.
      - run: make check
