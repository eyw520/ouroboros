# Billable/external tests live behind the `live` marker, excluded by default —
# the full suite runs fearlessly, locally and in CI; opt in with `-m live`.
# NOT auto-installed by init.sh: pytest.ini silently overrides pyproject.toml
# [tool.pytest] config, so add it only to a repo with no pytest config yet.
[pytest]
addopts = --strict-markers -m "not live"
markers =
    live: hits billable or external services; excluded by default and from CI
