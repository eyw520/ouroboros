line-length = 120
target-version = "py311"

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
]

[lint.isort]
combine-as-imports = true
split-on-trailing-comma = true
force-sort-within-sections = true
force-wrap-aliases = true
lines-after-imports = 2

[format]
quote-style = "double"
indent-style = "space"
